<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DIOS Knowledge Base</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f6f7fb; --panel:#fff; --muted:#8b8fa3; --text:#1f2430; --accent:#2f6bff;
    --chip:#eef2ff; --chip-text:#2b3a67; --chip-on:#2f6bff; --chip-on-text:#fff;
    --border:#e5e8f0; --danger:#e5484d; --ok:#0a7c2e;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);font:14px/1.35 Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial;color:var(--text)}
  .wrap{max-width:1200px;margin:28px auto;padding:0 16px}
  .hdr{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .brand{display:flex;align-items:center;gap:10px;margin-right:16px}
  .brand .dot{width:14px;height:14px;border-radius:4px;background:linear-gradient(135deg,#4f8cff,#7aa6ff)}
  .brand h1{font-size:16px;margin:0 0 -1px 0}
  .search{flex:1;display:flex;gap:8px}
  .search input{flex:1;height:40px;padding:0 12px;border:1px solid var(--border);border-radius:10px;background:#fff;outline:none}
  .search input:focus{border-color:#c9d3ff;box-shadow:0 0 0 3px #e9efff}
  .btn{height:40px;padding:0 14px;border-radius:10px;border:1px solid var(--border);background:#fff;cursor:pointer}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .opts{display:flex;align-items:center;gap:14px;margin-left:6px;color:var(--muted)}
  .opts input{vertical-align:middle;margin-right:6px}
  .grid{display:grid;grid-template-columns:280px 1fr;gap:16px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:14px}
  .left{padding:14px}
  .left h3{font-size:12px;letter-spacing:.02em;margin:14px 0 10px;color:#6d7389;text-transform:uppercase}
  .facet-sec{padding-bottom:6px;border-bottom:1px dashed var(--border)}
  .facet-list{display:flex;flex-wrap:wrap;gap:8px 8px;margin-bottom:10px}
  .chip{display:inline-flex;align-items:center;gap:8px;padding:7px 10px;border-radius:999px;background:var(--chip);color:var(--chip-text);border:1px solid #dfe6ff;cursor:pointer}
  .chip[data-on="1"]{background:var(--chip-on);color:var(--chip-on-text);border-color:var(--chip-on)}
  .chip .cnt{font-size:12px;opacity:.8}
  .right{padding:0}
  .result{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start}
  .result h4{margin:0 0 6px;font-size:15px}
  .meta{display:flex;flex-wrap:wrap;gap:6px 8px;margin:4px 0}
  .tag{display:inline-flex;align-items:center;gap:6px;background:#f1f4fb;border:1px solid var(--border);color:#4b5167;border-radius:999px;padding:4px 8px;font-size:12px}
  .path{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:#757c95;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .score{margin-left:auto;color:#4b5167;font-size:12px}
  .open{margin-left:8px}
  .open .btn{height:32px}
  .footer{padding:12px;text-align:center}
  .error{color:var(--danger);padding:12px}
  .muted{color:var(--muted)}
  pre.debug{white-space:pre-wrap;background:#0b1023;color:#c9d1ff;border-radius:12px;margin:12px;padding:12px;max-height:320px;overflow:auto;border:1px solid #1b2352}
  .toolbar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border)}
  .resinfo{color:var(--muted)}
  .right .empty{padding:22px}
  .btn.ghost{background:#fff;border-color:var(--border)}
  .btn.ghost:hover{border-color:#cfd6ea}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="brand"><div class="dot"></div><h1>DIOS Knowledge Base</h1></div>
    <div class="search">
      <input id="q" placeholder="Cerca… es: cartella clinica, telecardiologia, sit, 118…" autocomplete="off"/>
      <button class="btn primary" id="go">Cerca</button>
      <button class="btn" id="clear">Pulisci</button>
    </div>
    <div class="opts">
      <label><input type="checkbox" id="excludeDoc"> Escludi <b>Documentazione</b></label>
      <label><input type="checkbox" id="dbg"> Debug API</label>
    </div>
  </div>

  <div class="grid">
    <aside class="card left" id="facets">
      <h3>Filtri rapidi</h3>
      <div class="facet-sec" data-key="sezione">
        <h3>sezione</h3><div class="facet-list"></div>
      </div>
      <div class="facet-sec" data-key="anno">
        <h3>anno</h3><div class="facet-list"></div>
      </div>
      <div class="facet-sec" data-key="cliente">
        <h3>cliente</h3><div class="facet-list"></div>
      </div>
      <div class="facet-sec" data-key="ambito">
        <h3>ambito</h3><div class="facet-list"></div>
      </div>
      <div class="facet-sec" data-key="kb_area">
        <h3>kb_area</h3><div class="facet-list"></div>
      </div>
      <div class="facet-sec" data-key="livello">
        <h3>livello</h3><div class="facet-list"></div>
      </div>
      <div style="padding:10px 2px 4px">
        <button class="btn ghost" id="reset">Azzera filtri</button>
      </div>
    </aside>

    <section class="card right" id="results">
      <div class="toolbar">
        <div class="resinfo" id="resinfo">0 risultati</div>
        <div>
          <button class="btn ghost" id="more" style="display:none">Carica altri</button>
        </div>
      </div>
      <div id="list"></div>
      <div id="debug" style="display:none">
        <pre class="debug" id="dbgFacets"></pre>
        <pre class="debug" id="dbgSearch"></pre>
      </div>
    </section>
  </div>
</div>

<script>
(() => {
  const API_BASE = '/api';
  const PAGE_SIZE = 20;
  const DOC_EXCLUDE_VALUE = 'Documentazione';   // valore server-side per exclude_sections

  const state = {
    q: '',
    page: 0,
    total: 0,
    exclude: false,
    filters: {},     // { key: Set(values) }
    debug: false,
    fetching: false
  };

  const el = (sel, root=document) => root.querySelector(sel);
  const els = (sel, root=document) => [...root.querySelectorAll(sel)];

  const $q = el('#q'), $go = el('#go'), $clear = el('#clear');
  const $exclude = el('#excludeDoc'), $dbg = el('#dbg');
  const $facets = el('#facets'), $list = el('#list'), $more = el('#more'), $resinfo = el('#resinfo');
  const $dbgBox = el('#debug'), $dbgFacets = el('#dbgFacets'), $dbgSearch = el('#dbgSearch');
  const $reset = el('#reset');

  /* -------------------- networking -------------------- */
  function buildParams(extra={}) {
    const p = new URLSearchParams();
    const q = (extra.q ?? state.q ?? '').trim();
    if (q.length) p.set('q', q);
    p.set('k', extra.k ?? PAGE_SIZE);
    p.set('page', extra.page ?? state.page);
    if (extra.exclude ?? state.exclude) {
      p.set('exclude_sections', DOC_EXCLUDE_VALUE);
    }
    // filters as repeated param ?filters=key:value
    const filters = extra.filters ?? state.filters;
    Object.entries(filters).forEach(([key, set]) => {
      [...set].forEach(v => p.append('filters', `${key}:${v}`));
    });
    return p;
  }

  async function apiGet(path, params) {
    const url = `${API_BASE}${path}?${params.toString()}`;
    const r = await fetch(url);
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    const data = await r.json();
    if (state.debug) {
      if (path.includes('/facets')) $dbgFacets.textContent = JSON.stringify({url, data}, null, 2);
      if (path.includes('/search')) $dbgSearch.textContent = JSON.stringify({url, data}, null, 2);
    }
    return data;
  }

  /* -------------------- rendering -------------------- */
  function fmt(n) { return new Intl.NumberFormat('it-IT').format(n); }
  function tag(label, value) { return `<span class="tag"><b>${label}:</b> ${value}</span>` }
  function chip(key, value, count, on) {
    return `<span class="chip" data-key="${key}" data-value="${value}" data-on="${on?1:0}">
      <span>${value}</span><span class="cnt">${fmt(count)}</span>
    </span>`;
  }

  function renderFacets(data) {
    const strong = data?.strong || {};
    const groups = ['sezione','anno','cliente','ambito','kb_area','livello'];
    groups.forEach(g => {
      const box = el(`.facet-sec[data-key="${g}"] .facet-list`);
      if (!box) return;
      box.innerHTML = '';
      const items = strong[g] || {};
      const selected = state.filters[g] ? new Set(state.filters[g]) : new Set();
      // ordina alfabetico/numerico
      const keys = Object.keys(items).sort((a,b)=>{
        const na = Number(a), nb = Number(b);
        if(!Number.isNaN(na) && !Number.isNaN(nb)) return na-nb;
        return a.localeCompare(b,'it',{numeric:true});
      });
      keys.forEach(v=>{
        const cnt = items[v] ?? 0;
        const on = selected.has(String(v));
        box.insertAdjacentHTML('beforeend', chip(g, String(v), cnt, on));
      });
    });
  }

  function renderResults(hits, append=false) {
    if (!append) $list.innerHTML = '';
    if (!Array.isArray(hits) || hits.length===0) {
      if (!append) $list.innerHTML = `<div class="empty muted">Nessun risultato.</div>`;
      return;
    }
    const fr = document.createDocumentFragment();
    hits.forEach(h=>{
      const title = h.title || '(senza titolo)';
      const s = h.sezione ?? 'unknown';
      const c = h.cliente ?? 'unknown';
      const a = (h.anno ?? '').toString();
      const amb = h.ambito ?? 'unknown';
      const path = String(h.path_rel || '');
      const score = typeof h.score==='number' ? h.score.toFixed(3) : (h.score || '');
      const node = document.createElement('div');
      node.className = 'result';
      node.innerHTML = `
        <div style="flex:1;min-width:0">
          <h4>${title}</h4>
          <div class="meta">
            ${tag('Sezione', s)} ${tag('Cliente', c)} ${a?tag('Anno', a):''} ${tag('Ambito', amb)}
          </div>
          <div class="path">${path}</div>
        </div>
        <div class="score">score: <b>${score}</b></div>
        <div class="open"><a class="btn" href="/files/${encodeURI(path)}" target="_blank" rel="noopener">Apri</a></div>
      `;
      fr.appendChild(node);
    });
    $list.appendChild(fr);
  }

  function updateResInfo(count, total){
    $resinfo.textContent = `${fmt(total)} risultati`;
    $more.style.display = (count === PAGE_SIZE) ? '' : 'none';
  }

  /* -------------------- facet selection -------------------- */
  function toggleFacet(key, value){
    const set = state.filters[key] || (state.filters[key] = new Set());
    if (set.has(value)) set.delete(value); else set.add(value);
    // rimuovi key se vuoto
    if (set.size===0) delete state.filters[key];
    state.page = 0;
    search();
  }

  $facets.addEventListener('click', (ev)=>{
    const t = ev.target.closest('.chip');
    if (!t) return;
    toggleFacet(t.dataset.key, t.dataset.value);
  });

  /* -------------------- search flow -------------------- */
  async function search(append=false){
    if (state.fetching) return;
    state.fetching = true;
    try{
      $dbgBox.style.display = state.debug ? '' : 'none';

      // 1) facets (con i filtri attuali) – serve per aggiornare conteggi e “selected”
      const pFac = buildParams({page:0});
      const fData = await apiGet('/facets', pFac);
      renderFacets(fData);

      // 2) search
      const pSrch = buildParams({page: state.page});
      const sData = await apiGet('/search', pSrch);
      // la tua API può restituire data.hits oppure data.results
      const hits = Array.isArray(sData?.hits || sData?.results) ? (sData.hits || sData.results) : [];
      renderResults(hits, append);
      state.total = Number(sData?.count ?? (state.page*PAGE_SIZE + hits.length));
      updateResInfo(hits.length, state.total);
    }catch(err){
      $list.innerHTML = `<div class="error">Errore durante la ricerca: ${err.message}</div>`;
      $more.style.display = 'none';
    }finally{
      state.fetching = false;
    }
  }

  /* -------------------- events -------------------- */
  $go.addEventListener('click', ()=>{
    state.q = $q.value.trim();
    state.page = 0;
    search();
  });
  $clear.addEventListener('click', ()=>{
    $q.value = '';
    state.q = '';
    state.page = 0;
    state.filters = {};
    search();
  });
  $exclude.addEventListener('change', ()=>{
    state.exclude = $exclude.checked;
    state.page = 0;
    search();
  });
  $dbg.addEventListener('change', ()=>{
    state.debug = $dbg.checked;
    $dbgBox.style.display = state.debug ? '' : 'none';
  });
  $q.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ $go.click(); }});
  $reset.addEventListener('click', ()=>{
    state.filters = {};
    state.page = 0;
    search();
  });
  $more.addEventListener('click', ()=>{
    state.page += 1;
    search(true);
  });

  // init (stato di default: niente query -> nessuna chiamata; fai pure auto-lancio se preferisci)
  // state.q = ''; search();
})();
</script>
</body>
</html>

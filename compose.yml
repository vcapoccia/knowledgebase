version: '3.8'

networks:
  kb-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  qdrant_storage:
    driver: local
  logs:
    driver: local

services:
  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: kb-qdrant
    restart: unless-stopped
    networks:
      - kb-network
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
      - logs:/var/log
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=${QDRANT_LOG_LEVEL:-INFO}
      - QDRANT__STORAGE__SNAPSHOTS_PATH=/qdrant/storage/snapshots
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "${QDRANT_CPU_LIMIT:-2.0}"
          memory: "${QDRANT_MEMORY_LIMIT:-4G}"
        reservations:
          cpus: "${QDRANT_CPU_RESERVATION:-0.5}"
          memory: "${QDRANT_MEMORY_RESERVATION:-1G}"

  # KB API (FastAPI Backend)
  kb-api:
    build:
      context: ./apps/kb-api
      dockerfile: Dockerfile
      target: production
    container_name: kb-api
    restart: unless-stopped
    networks:
      - kb-network
    ports:
      - "${KB_API_PORT:-8000}:8000"
    volumes:
      - ./docs:${KB_ROOT}:ro
      - logs:/app/logs
      - ./config/kb-api:/app/config:ro
    environment:
      - ENV=production
      - KB_ROOT=${KB_ROOT}
      - KB_GARE_DIR=${KB_GARE_DIR}
      - KB_AQ_DIR=${KB_AQ_DIR}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-kb_chunks}
      - LOG_LEVEL=${KB_API_LOG_LEVEL:-INFO}
      - WORKERS=${KB_API_WORKERS:-4}
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "${KB_API_CPU_LIMIT:-1.0}"
          memory: "${KB_API_MEMORY_LIMIT:-2G}"

  # KB UI (Frontend)
  kb-ui:
    build:
      context: ./apps/kb-ui
      dockerfile: Dockerfile
      target: production
    container_name: kb-ui
    restart: unless-stopped
    networks:
      - kb-network
    volumes:
      - logs:/var/log/nginx
    environment:
      - NGINX_ENVSUBST_TEMPLATE_DIR=/etc/nginx/templates
      - NGINX_ENVSUBST_TEMPLATE_SUFFIX=.template
      - KB_API_URL=http://kb-api:8000
    depends_on:
      kb-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # KB Ingest (Document Processing)
  kb-ingest:
    build:
      context: ./apps/kb-ingest
      dockerfile: Dockerfile
      target: production
    container_name: kb-ingest
    restart: "no"  # One-shot service
    networks:
      - kb-network
    volumes:
      - ./docs:${KB_ROOT}:ro
      - logs:/app/logs
      - ./temp/uploads:/app/temp
    environment:
      - ENV=production
      - KB_ROOT=${KB_ROOT}
      - KB_GARE_DIR=${KB_GARE_DIR}
      - KB_AQ_DIR=${KB_AQ_DIR}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-kb_chunks}
      - LOG_LEVEL=${KB_INGEST_LOG_LEVEL:-INFO}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      - BATCH_SIZE=${INGEST_BATCH_SIZE:-100}
      - MAX_CHUNK_SIZE=${MAX_CHUNK_SIZE:-1000}
    depends_on:
      qdrant:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "${KB_INGEST_CPU_LIMIT:-2.0}"
          memory: "${KB_INGEST_MEMORY_LIMIT:-4G}"

  # Caddy Reverse Proxy
  caddy:
    image: caddy:2.7.6-alpine
    container_name: kb-caddy
    restart: unless-stopped
    networks:
      - kb-network
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
      - "${PUBLIC_HTTPS_PORT:-443}:443"
      - "${CADDY_ADMIN_PORT:-2019}:2019"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./docs:${KB_ROOT}:ro
      - caddy_data:/data
      - caddy_config:/config
      - logs:/var/log
    environment:
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
      - KB_UI_UPSTREAM=kb-ui:80
      - KB_API_UPSTREAM=kb-api:8000
      - KB_ROOT=${KB_ROOT}
    depends_on:
      - kb-ui
      - kb-api
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Log Aggregator (Optional)
  fluent-bit:
    image: fluent/fluent-bit:2.2.0
    container_name: kb-logs
    restart: unless-stopped
    networks:
      - kb-network
    volumes:
      - logs:/var/log
      - ./config/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
    ports:
      - "${FLUENT_BIT_PORT:-24224}:24224"
    profiles:
      - monitoring
    depends_on:
      - kb-api
      - kb-ui
      - caddy

volumes:
  caddy_data:
  caddy_config:
name: kbsearch

networks:
  kbnet: {}

volumes:
  kb_api_data: {}
  qdrant_storage: {}

services:
  qdrant:
    image: qdrant/qdrant:latest
    networks: [kbnet]
    volumes:
      - qdrant_storage:/qdrant/storage
    ports:
      - "6333:6333"

  kb-ingest:
    build:
      context: /etc/kbsearch/apps/kb-ingest
      dockerfile: Dockerfile
    networks: [kbnet]
    depends_on:
      - qdrant
    environment:
      # Sorgenti KB
      KB_ROOT: /mnt/kb
      KB_GARE_DIR: /mnt/kb/_Gare
      KB_AQ_DIR: /mnt/kb/_AQ

      # Qdrant
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: kb_chunks

      # Parametri embedding/chunking (coerenti con l’API)
      EMBED_MODEL: BAAI/bge-m3
      CHUNK_SIZE: "800"
      CHUNK_OVERLAP: "120"
      INGEST_BATCH: "128"
      INGEST_WORKERS: "2"

    volumes:
      - /etc/kbsearch/config.yaml:/app/config.yaml:ro  # opzionale, se l’usate
      - /mnt/kb:/mnt/kb:ro                             # legge i file sorgente
      - /etc/kbsearch/run:/hostrun                     # log/flag lato host

    # GPU (Compose moderno: abilita l’accesso alla GPU se presente)
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]

  kb-api:
    build:
      context: ./apps/kb-api
      dockerfile: Dockerfile
    networks: [kbnet]
    environment:
      ADMIN_TOKEN: change-me
      API_PORT: "8080"
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: kb_chunks
      EMBED_MODEL: BAAI/bge-m3
      RERANK_MODEL: BAAI/bge-reranker-base
      KB_ROOT: /mnt/kb
      KB_GARE_DIR: /mnt/kb/_Gare
      KB_AQ_DIR: /mnt/kb/_AQ
    depends_on:
      - qdrant
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - kb_api_data:/data
      - ./run:/hostrun
    ports:
      - "8080:8080"

  kb-ui:
    image: nginx:alpine
    networks: [kbnet]
    volumes:
      - ./apps/kb-ui:/usr/share/nginx/html:ro

  caddy:
    image: caddy:2
    networks: [kbnet]
    depends_on:
      - kb-api
      - kb-ui
    ports:
      - "80:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - type: bind
        source: /mnt/kb
        target: /srv/files
        read_only: true
